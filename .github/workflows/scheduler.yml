name: Exchange Rate Scheduler

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    concurrency:
      group: exchange-rate-scheduler
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug workflow file
        run: |
          echo "===== WORKFLOW FILE ====="
          cat .github/workflows/scheduler.yml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install requests
          pip install sqlalchemy
          pip install psycopg2-binary
          pip install python-dotenv

      - name: Debug installed packages
        run: |
          echo "===== INSTALLED PACKAGES ====="
          pip list

      - name: Run scheduler script
        env:
          NEON_DB_PASSWORD: ${{ secrets.NEON_DB_PASSWORD }}
          NEON_DB_ENDPOINT: ${{ secrets.NEON_DB_ENDPOINT }}
          F5_API_2_PASSWORD: ${{ secrets.F5_API_2_PASSWORD }}
        run: |
          python refresh_api_scheduler.py